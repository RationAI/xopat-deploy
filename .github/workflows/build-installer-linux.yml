name: Build Installer Linux

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Installer tag (e.g. installer-v1.0.0)'
        required: true
        type: string
      wsi_tag:
        description: 'WSI-Service tag (e.g. wsi-v1.0.0). Leave empty for latest.'
        required: false
        type: string
      xopat_tag:
        description: 'xOpat tag (e.g. xopat-v1.0.0). Leave empty for latest.'
        required: false
        type: string
      ref:
        description: 'Branch to build from (e.g. develop)'
        required: false
        default: 'develop'
        type: string

jobs:
  build-installer-linux:
    name: Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Resolve tags
        id: tags
        run: |
          if [ -n "${{ inputs.wsi_tag }}" ]; then
            echo "wsi=${{ inputs.wsi_tag }}" >> $GITHUB_OUTPUT
          else
            echo "wsi=$(gh release list --json tagName -q '[.[] | select(.tagName | startswith("wsi-v"))][0].tagName')" >> $GITHUB_OUTPUT
          fi
          if [ -n "${{ inputs.xopat_tag }}" ]; then
            echo "xopat=${{ inputs.xopat_tag }}" >> $GITHUB_OUTPUT
          else
            echo "xopat=$(gh release list --json tagName -q '[.[] | select(.tagName | startswith("xopat-v"))][0].tagName')" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download WSI-Service binary
        run: |
          curl -L "https://github.com/RationAI/xopat-deploy/releases/download/${{ steps.tags.outputs.wsi }}/wsi_service_binary_linux_${{ steps.tags.outputs.wsi }}.zip" -o wsi.zip
          unzip wsi.zip -d installer_linux/packages/xopat/data/wsi-service
          rm wsi.zip

      - name: Download xOpat binary
        run: |
          curl -L "https://github.com/RationAI/xopat-deploy/releases/download/${{ steps.tags.outputs.xopat }}/xopat_linux_${{ steps.tags.outputs.xopat }}.zip" -o xopat.zip
          unzip xopat.zip -d installer_linux/packages/xopat/data/xopat
          rm xopat.zip

      - name: Copy .env template
        run: |
          cp envs/wsi_service.env installer_linux/packages/xopat/data/wsi-service/.env

      - name: Copy icon to installer data and config
        run: |
          cp assets/xopat-logo.png installer_linux/packages/xopat/data/xopat-logo.png
          cp assets/xopat-logo.ico installer_linux/config/xopat-logo.ico

      - name: Install Qt IFW
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          tools: 'tools_ifw'
          cache: true

      - name: Build installer
        run: |
          "$IQTA_TOOLS/QtInstallerFramework/4.7/bin/binarycreator" \
            -c installer_linux/config/config.xml \
            -p installer_linux/packages \
            "xOpat-Installer-Linux-${{ inputs.tag }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          files: xOpat-Installer-Linux-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
