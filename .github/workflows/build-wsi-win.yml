name: Build WSI-Service Windows

on:
  push:
    tags:
      - 'wsi-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. wsi-v1.0.0)'
        required: true
        type: string
      ref:
        description: 'Branch to build from (e.g. develop)'
        required: false
        default: 'develop'
        type: string

jobs:
  build-windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
          submodules: false

      - name: Checkout WSI-Service submodule
        run: git submodule update --init --recursive external/wsi-service

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create py alias
        shell: pwsh
        run: Set-Alias -Name py -Value python -Scope Global

      - name: Run build script
        shell: pwsh
        run: scripts\windows\build_wsi_service.ps1

      - name: Determine tag name
        id: tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            echo "value=${{ github.event.inputs.tag }}" >> $env:GITHUB_OUTPUT
          } else {
            echo "value=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }

      - name: Package artifact
        shell: pwsh
        run: |
          Compress-Archive -Path dist\wsi_service_binary\* `
            -DestinationPath "wsi_service_binary_windows_${{ steps.tag.outputs.value }}.zip"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          files: wsi_service_binary_windows_*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
